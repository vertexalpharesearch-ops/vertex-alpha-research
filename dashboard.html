<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Vertex Alpha Research</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
    
    <aside class="sidebar">
        <div class="logo">Vertex Alpha Research</div>
        <nav class="sidebar-nav" id="filter-nav">
            <a href="#" class="active" data-category="All">Overview</a>
            <a href="#" data-category="Equities">Equities</a>
            <a href="#" data-category="Crypto">Crypto Strategies</a>
            <a href="#" data-category="Macro">Macro</a>
            <a href="#" data-category="Biotech">Biotech</a>
        </nav>
        <div class="sidebar-bottom">
            <a href="admin-publish.html" id="admin-link" style="display: none; color: var(--accent-green); font-weight: bold;">+ Publish Report</a>
            
            <a href="settings.html">Account Settings</a>
            <a href="#">Sign Out</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="search-bar">
                <input type="text" placeholder="Search tickers, sectors, or reports...">
            </div>
            <div class="user-profile">Member Profile</div>
        </header>

        <section class="welcome-banner">
            <div>
                <span class="tag">New Release</span>
                <h2>Integrating Alpaca API for Micro-Cap Momentum</h2>
                <p>Published April 21, 2026 • 15 min read</p>
            </div>
            <button class="btn-primary">Read Full Report</button>
        </section>

        <section class="recent-uploads">
            <h3>Recent Research</h3>
            <div class="grid-3" id="reports-grid">
                
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        // Your exact Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDS_9zdiwhNsgvfsomYd3uByPHats-8JjA",
            authDomain: "vertex-alpha-research.firebaseapp.com",
            projectId: "vertex-alpha-research",
            storageBucket: "vertex-alpha-research.firebasestorage.app",
            messagingSenderId: "992971890985",
            appId: "1:992971890985:web:1dec88b6a69a5812e61738",
            measurementId: "G-YYZSQWEKQN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // Initialize Auth
        
        // THE LOCK: Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Kick them out to the login page if not logged in
                window.location.href = "login.html"; 
            } else {
                // If they are logged in, load the reports!
                loadReports(); 
                
                // Update the UI with their email
                document.querySelector('.user-profile').innerText = user.email;

                // THE MAGIC: If it's the admin, unhide the publish button!
                if (user.email === "vertexalpharesearch@gmail.com") {
                    document.getElementById('admin-link').style.display = 'block';
                }
            }
        });

        // Logout Button Logic
        document.querySelector('.sidebar-bottom a:last-child').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = "login.html");
        });

        // Fetch and Render Reports
        async function loadReports() {
            const grid = document.getElementById('reports-grid');
            grid.innerHTML = '<p style="color: var(--text-muted);">Loading research from database...</p>';

            try {
                // Query reports, newest first
                const q = query(collection(db, "reports"), orderBy("publishDate", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = ''; // Clear loading text

                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">No reports published yet.</p>';
                    return;
                }

                // Loop through database and build cards
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    const cardHTML = `
                        <div class="report-card">
                            <div class="report-category">${data.category || 'Research'}</div>
                            <h4>${data.title || 'Untitled Report'}</h4>
                            <p>${data.summary || ''}</p>
                            
                            <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                                <a href="${data.previewPdfUrl || '#'}" target="_blank" class="download-link" style="color: var(--text-muted); font-weight: normal;">📄 Read Free Preview</a>
                                <a href="${data.fullPdfUrl || '#'}" target="_blank" class="download-link" style="color: var(--accent-green);">🔒 Download Full Report</a>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error("Error loading reports:", error);
                grid.innerHTML = '<p style="color: #ef4444;">Failed to load data. Please check console.</p>';
            }
        }

        // --- SIDEBAR FILTERING LOGIC ---
        const filterLinks = document.querySelectorAll('#filter-nav a');
        
        filterLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault(); // Stop the '#' from jumping to the top of page
                
                // Update active styling
                filterLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Get the category we want to see (e.g., "Crypto", "Equities")
                const selectedCategory = link.getAttribute('data-category');
                const allCards = document.querySelectorAll('.report-card');

                // Loop through all cards on the screen
                allCards.forEach(card => {
                    const cardCategory = card.querySelector('.report-category').innerText;
                    
                    // If "All" is selected, or the card's category matches the clicked link
                    if (selectedCategory === "All" || cardCategory === selectedCategory) {
                        card.style.display = "block"; // Show it
                    } else {
                        card.style.display = "none";  // Hide it
                    }
                });
            });
        });

    </script>
</body>
</html>
