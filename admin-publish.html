<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Publisher | Vertex Alpha Research</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Extra styles just for the admin form */
        .admin-container { max-width: 600px; margin: 80px auto; padding: 40px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input[type="text"], .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-darker); color: white; }
        .form-group textarea { resize: vertical; height: 100px; }
        .form-group input[type="file"] { width: 100%; padding: 10px; color: var(--text-muted); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        #status-message { margin-top: 20px; font-weight: bold; text-align: center; }
        .success { color: var(--accent-green); }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo">Vertex Alpha Research <span class="tag">ADMIN</span></div>
            <nav><a href="dashboard.html">Back to Dashboard</a></nav>
        </div>
    </header>

    <div class="container">
        <div class="admin-container">
            <h2>Publish New Report</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Upload a PDF and push to the live database.</p>
            
            <form id="publish-form">
                <div class="form-group">
                    <label>Report Title</label>
                    <input type="text" id="title" placeholder="e.g., Kraken Liquidity Analysis" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="Crypto">Crypto</option>
                        <option value="Equities">Equities</option>
                        <option value="Macro">Macro</option>
                        <option value="Biotech">Biotech</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Summary</label>
                    <textarea id="summary" placeholder="Brief description of the edge/strategy..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Upload PDF Report</label>
                    <input type="file" id="pdf-file" accept="application/pdf" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="is-premium" checked>
                    <label for="is-premium">Premium Report (Requires Subscription)</label>
                </div>

                <button type="submit" class="btn-primary full-width" id="submit-btn">Upload & Publish</button>
            </form>

            <div id="status-message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        // ADDED AUTH IMPORTS:
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Your exact config
        const firebaseConfig = {
            apiKey: "AIzaSyDS_9zdiwhNsgvfsomYd3uByPHats-8JjA",
            authDomain: "vertex-alpha-research.firebaseapp.com",
            projectId: "vertex-alpha-research",
            storageBucket: "vertex-alpha-research.firebasestorage.app",
            messagingSenderId: "992971890985",
            appId: "1:992971890985:web:1dec88b6a69a5812e61738"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        // --- THE BOUNCER: HARDCODED ADMIN EMAIL ---
        const ADMIN_EMAIL = "vertexalpharesearch@gmail.com"; // <-- PUT CLIENT'S EMAIL HERE

        // Hide the form by default until we prove they are the admin
        const formContainer = document.querySelector('.admin-container');
        formContainer.style.display = 'none';

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Not logged in at all -> send to login
                window.location.href = "login.html";
            } else if (user.email !== ADMIN_EMAIL) {
                // Logged in, but NOT the admin -> send to dashboard
                alert("Access Denied: Admin privileges required.");
                window.location.href = "dashboard.html";
            } else {
                // IT IS THE ADMIN! Show the form.
                formContainer.style.display = 'block';
            }
        });

        // --- THE UPLOAD LOGIC (Same as before) ---
        const form = document.getElementById('publish-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading PDF...";
            statusMsg.innerText = "";

            try {
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const summary = document.getElementById('summary').value;
                const isPremium = document.getElementById('is-premium').checked;
                const file = document.getElementById('pdf-file').files[0];

                const fileName = `reports/${Date.now()}_${file.name}`;
                const storageRef = ref(storage, fileName);

                const snapshot = await uploadBytes(storageRef, file);
                submitBtn.innerText = "Saving to Database...";

                const pdfUrl = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, "reports"), {
                    title: title,
                    category: category,
                    summary: summary,
                    publishDate: serverTimestamp(),
                    pdfUrl: pdfUrl,
                    isPremium: isPremium
                });

                form.reset();
                statusMsg.className = "success";
                statusMsg.innerText = "Report published successfully!";
                submitBtn.innerText = "Upload & Publish";
                submitBtn.disabled = false;

            } catch (error) {
                console.error("Error publishing report: ", error);
                statusMsg.className = "error";
                statusMsg.innerText = "Error: " + error.message;
                submitBtn.innerText = "Upload & Publish";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
