<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Publisher | Vertex Alpha Research</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 600px; margin: 80px auto; padding: 40px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input[type="text"], .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-darker); color: white; }
        .form-group textarea { resize: vertical; height: 100px; }
        .form-group input[type="file"] { width: 100%; padding: 10px; color: var(--text-muted); background: var(--bg-darker); border: 1px dashed var(--border-color); border-radius: 6px;}
        #status-message { margin-top: 20px; font-weight: bold; text-align: center; }
        .success { color: var(--accent-green); }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div id="global-loader">
        <img src="logo.png" class="loader-logo" alt="Vertex Alpha Loading">
    </div>

    <header>
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="Vertex Alpha Icon">
                    Vertex Alpha Research <span class="tag" style="margin-bottom: 0; margin-left: 8px;">ADMIN</span>
                </a>
            </div>
            <nav><a href="dashboard.html">Back to Dashboard</a></nav>
        </div>
    </header>

    <div class="container">
        <div class="admin-container">
            <h2>Publish New Report</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Upload your free preview and the full premium PDF.</p>
            
            <form id="publish-form">
                <div class="form-group">
                    <label>Report Title</label>
                    <input type="text" id="title" placeholder="e.g., Palantir (PLTR) Deep Dive" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="Pre-IPO">Pre-IPO</option>
                        <option value="Equities">Equities</option>
                        <option value="Crypto">Crypto Strategies</option>
                        <option value="Macro">Macro</option>
                        <option value="Homepage Sample">Homepage Free Sample (Landing Page Only)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Summary / Bullet Points</label>
                    <textarea id="summary" placeholder="Investment Thesis • Financial Analysis • Risks..." required></textarea>
                </div>

                <div class="form-group">
                    <label>📄 Upload PREVIEW PDF (Free Users)</label>
                    <input type="file" id="preview-pdf-file" accept="application/pdf" required>
                </div>

                <div class="form-group">
                    <label>🔒 Upload FULL PDF (Premium Users)</label>
                    <input type="file" id="full-pdf-file" accept="application/pdf" required>
                </div>

                <button type="submit" class="btn-primary full-width" id="submit-btn">Upload & Publish</button>
            </form>

            <div id="status-message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDS_9zdiwhNsgvfsomYd3uByPHats-8JjA",
            authDomain: "vertex-alpha-research.firebaseapp.com",
            projectId: "vertex-alpha-research",
            storageBucket: "vertex-alpha-research.firebasestorage.app",
            messagingSenderId: "992971890985",
            appId: "1:992971890985:web:1dec88b6a69a5812e61738"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        const ADMIN_EMAIL = "vertexalpharesearch@gmail.com"; 

        const formContainer = document.querySelector('.admin-container');
        formContainer.style.display = 'none';

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else if (user.email !== ADMIN_EMAIL) {
                alert("Access Denied: Admin privileges required.");
                window.location.href = "dashboard.html";
            } else {
                formContainer.style.display = 'block';
            }
        });

        const form = document.getElementById('publish-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading PDFs (Do not close)...";
            statusMsg.innerText = "";

            try {
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const summary = document.getElementById('summary').value;
                
                // Get both files
                const previewFile = document.getElementById('preview-pdf-file').files[0];
                const fullFile = document.getElementById('full-pdf-file').files[0];

                // Create unique names
                const previewName = `reports/preview_${Date.now()}_${previewFile.name}`;
                const fullName = `reports/full_${Date.now()}_${fullFile.name}`;

                // Upload BOTH files at the same time
                const [previewSnap, fullSnap] = await Promise.all([
                    uploadBytes(ref(storage, previewName), previewFile),
                    uploadBytes(ref(storage, fullName), fullFile)
                ]);

                submitBtn.innerText = "Saving to Database...";

                // Get both download URLs
                const previewPdfUrl = await getDownloadURL(previewSnap.ref);
                const fullPdfUrl = await getDownloadURL(fullSnap.ref);

                // Save to database
                if (category === "Homepage Sample") {
                    // 1. Save ONLY to the settings document (Overwrites the old homepage sample)
                    await setDoc(doc(db, "settings", "homepage_featured"), {
                        title: title,
                        meta: summary,
                        pdfUrl: previewPdfUrl // Uses the uploaded preview file for the homepage link
                    });
                } else {
                    // 2. Normal publish to member dashboard
                    await addDoc(collection(db, "reports"), {
                        title: title,
                        category: category,
                        summary: summary,
                        publishDate: serverTimestamp(),
                        previewPdfUrl: previewPdfUrl,
                        fullPdfUrl: fullPdfUrl
                    });
                }

                form.reset();
                statusMsg.className = "success";
                statusMsg.innerText = "Report published successfully!";
            } catch (error) {
                console.error("Error publishing report: ", error);
                statusMsg.className = "error";
                statusMsg.innerText = "Error: " + error.message;
            } finally {
                submitBtn.innerText = "Upload & Publish";
                submitBtn.disabled = false;
            }
        });
    </script>

    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('global-loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 500); 
        });
    </script>
        
</body>
</html>
