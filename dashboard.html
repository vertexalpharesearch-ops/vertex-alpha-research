<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Vertex Alpha Research</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">

    <div id="global-loader">
        <img src="logo.png" class="loader-logo" alt="Vertex Alpha Loading">
    </div>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="Vertex Alpha Icon">
                    Vertex Alpha Research
                </a>
            </div>
            <button id="mobile-menu-btn" class="hamburger-btn">☰</button>
        </div>

        <nav class="sidebar-nav" id="filter-nav">
            <a href="#" class="active" data-category="All">Overview</a>
            <a href="#" data-category="Equities">Equities</a>
            <a href="#" data-category="Crypto">Crypto Strategies</a>
            <a href="#" data-category="Macro">Macro</a>
            <a href="#" data-category="Biotech">Biotech</a>
        </nav>

        <div class="sidebar-bottom" id="mobile-dropdown">
            <span class="mobile-email" id="dropdown-email"></span>
            <a href="admin-publish.html" id="admin-link" style="display: none; color: var(--accent-green); font-weight: bold;">+ Publish Report</a>
            <a href="index.html" style="color: var(--text-muted);">← Main Website</a>
            <a href="settings.html">Account Settings</a>
            <a href="#" id="sidebar-signout">Sign Out</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="search-bar">
                <input type="text" placeholder="Search tickers, sectors, or reports...">
            </div>
            <div class="user-profile" id="desktop-email">Member Profile</div>
        </header>

        <section class="welcome-banner" id="featured-banner" style="display: none;">
            <div>
                <span class="tag">New Release</span>
                <h2 id="featured-title">Loading Latest Report...</h2>
                <p id="featured-meta">Please wait...</p>
            </div>
            <a href="#" id="featured-btn" target="_blank" class="btn-primary" style="text-decoration: none; display: inline-block; text-align: center;">Read Full Report</a>
        </section>

        <section class="recent-uploads">
            <h3>Recent Research</h3>
            <div class="grid-3" id="reports-grid">
                
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDS_9zdiwhNsgvfsomYd3uByPHats-8JjA",
            authDomain: "vertex-alpha-research.firebaseapp.com",
            projectId: "vertex-alpha-research",
            storageBucket: "vertex-alpha-research.firebasestorage.app",
            messagingSenderId: "992971890985",
            appId: "1:992971890985:web:1dec88b6a69a5812e61738",
            measurementId: "G-YYZSQWEKQN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 
        
        // --- Hamburger Menu Logic ---
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-dropdown').classList.toggle('show');
        });

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; 
            } else {
                loadReports(); 
                
                document.getElementById('desktop-email').innerText = user.email;
                document.getElementById('dropdown-email').innerText = user.email;

                if (user.email === "vertexalpharesearch@gmail.com") {
                    document.getElementById('admin-link').style.display = 'block';
                }
            }
        });

        document.getElementById('sidebar-signout').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = "login.html");
        });

        async function loadReports() {
            const grid = document.getElementById('reports-grid');
            const banner = document.getElementById('featured-banner');
            grid.innerHTML = '<p style="color: var(--text-muted);">Loading research from database...</p>';

            try {
                // Fetch reports ordered by newest first
                const q = query(collection(db, "reports"), orderBy("publishDate", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = ''; 

                // If database is totally empty
                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">No reports published yet.</p>';
                    banner.style.display = 'none'; 
                    return;
                }

                // Convert Firebase snapshot to a standard array we can easily slice
                const allDocs = querySnapshot.docs;

                // --- 1. POPULATE THE NEW RELEASE BANNER (Index 0) ---
                const latestData = allDocs[0].data();
                
                document.getElementById('featured-title').innerText = latestData.title || 'Untitled Report';
                document.getElementById('featured-meta').innerText = `${latestData.category || 'Research'} • Newly Published`;
                document.getElementById('featured-btn').href = latestData.fullPdfUrl || '#';
                
                // Show the banner now that data is loaded
                banner.style.display = 'flex'; 

                // --- 2. POPULATE THE GRID WITH THE REST (Index 1 and beyond) ---
                if (allDocs.length > 1) {
                    for (let i = 1; i < allDocs.length; i++) {
                        const data = allDocs[i].data();
                        const cardHTML = `
                            <div class="report-card">
                                <div class="report-category">${data.category || 'Research'}</div>
                                <h4>${data.title || 'Untitled Report'}</h4>
                                <p>${data.summary || ''}</p>
                                
                                <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                                    <a href="${data.previewPdfUrl || '#'}" target="_blank" class="download-link" style="color: var(--text-muted); font-weight: normal;">📄 Read Free Preview</a>
                                    <a href="${data.fullPdfUrl || '#'}" target="_blank" class="download-link" style="color: var(--accent-green);">🔒 Download Full Report</a>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += cardHTML;
                    }
                } else {
                    // If there is only exactly 1 report, it goes in the banner, so the grid is empty
                    grid.innerHTML = '<p style="color: var(--text-muted);">No older reports available.</p>';
                }

            } catch (error) {
                console.error("Error loading reports:", error);
                grid.innerHTML = '<p style="color: #ef4444;">Failed to load data. Please check console.</p>';
            }
        }
        
        // --- UPDATED, BULLETPROOF SIDEBAR FILTERING LOGIC ---
        const filterLinks = document.querySelectorAll('#filter-nav a');
        
        filterLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault(); 
                
                filterLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Get category and force it to lowercase
                const selectedCategory = link.getAttribute('data-category').toLowerCase();
                const allCards = document.querySelectorAll('.report-card');

                allCards.forEach(card => {
                    // Get text, force to lowercase, and trim whitespace
                    const cardCategory = card.querySelector('.report-category').textContent.toLowerCase().trim();
                    
                    if (selectedCategory === "all" || cardCategory.includes(selectedCategory)) {
                        card.style.display = "block"; 
                    } else {
                        card.style.display = "none";  
                    }
                });
            });
        });
    </script>

    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('global-loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 500); 
        });
    </script>
</body>
</html>
